name: Deploy to Capgo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install

      - name: Build Project
        run: npm run build
- name: Deploy to Capgo
        run: npx @capgo/cli@latest bundle upload --channel=production --apikey=${{ secrets.CAPGO_TOKEN }}
