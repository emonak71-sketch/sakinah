name: Deploy to Capgo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to Capgo
        run: npx @capgo/cli@latest bundle upload 02533bbe-581b-4b3b-a6ef-0c4d328c5597 --apikey ${{ secrets.CAPGO_TOKEN }} --channel production
